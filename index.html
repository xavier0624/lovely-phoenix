<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1A1A2E">
    <title>Lovely Phoenix</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="topbar-title">Lovely Phoenix</span>
            </div>
            <div class="topbar-right">
                <button class="topbar-icon-btn" id="settings-btn" aria-label="设置">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M10 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M16.17 12.5a1.38 1.38 0 00.28 1.52l.05.05a1.67 1.67 0 11-2.36 2.36l-.05-.05a1.38 1.38 0 00-1.52-.28 1.38 1.38 0 00-.84 1.26v.14a1.67 1.67 0 11-3.34 0v-.07a1.38 1.38 0 00-.9-1.26 1.38 1.38 0 00-1.52.28l-.05.05a1.67 1.67 0 11-2.36-2.36l.05-.05a1.38 1.38 0 00.28-1.52 1.38 1.38 0 00-1.26-.84h-.14a1.67 1.67 0 110-3.34h.07a1.38 1.38 0 001.26-.9 1.38 1.38 0 00-.28-1.52l-.05-.05a1.67 1.67 0 112.36-2.36l.05.05a1.38 1.38 0 001.52.28h.07a1.38 1.38 0 00.84-1.26v-.14a1.67 1.67 0 113.34 0v.07a1.38 1.38 0 00.84 1.26 1.38 1.38 0 001.52-.28l.05-.05a1.67 1.67 0 112.36 2.36l-.05.05a1.38 1.38 0 00-.28 1.52v.07a1.38 1.38 0 001.26.84h.14a1.67 1.67 0 110 3.34h-.07a1.38 1.38 0 00-1.26.84z" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </button>
                <button class="today-pill" id="today-btn">今天</button>
            </div>
        </header>

        <!-- Date Switcher -->
        <div class="date-switcher">
            <button class="switcher-arrow" id="prev-day-btn" aria-label="前一天">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <path d="M14 4L7 11L14 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="switcher-text" id="switcher-text">
                <span class="switcher-label" id="date-nav-label">今天</span>
                <span class="switcher-date" id="date-nav-date"></span>
            </div>
            <button class="switcher-arrow" id="next-day-btn" aria-label="后一天">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <path d="M8 4L15 11L8 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- AI Diary Button -->
        <div class="ai-bar">
            <button class="ai-btn" id="ai-diary-btn">
                <svg class="ai-sparkle" width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M9 1.5L9.9 6.3C10.4 7.8 11.7 9.1 13.2 9.6L18 10.5L13.2 11.4C11.7 11.9 10.4 13.2 9.9 14.7L9 19.5L8.1 14.7C7.6 13.2 6.3 11.9 4.8 11.4L0 10.5L4.8 9.6C6.3 9.1 7.6 7.8 8.1 6.3L9 1.5Z" fill="currentColor"/>
                </svg>
                <span>AI 生成日记</span>
            </button>
        </div>

        <!-- Timeline Viewport -->
        <main class="viewport" id="viewport">
            <div class="timeline-canvas" id="timeline-canvas"></div>
        </main>

        <!-- Floating Add Button -->
        <button class="fab" id="fab-btn" aria-label="添加记录">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                <path d="M13 3V23M3 13H23" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </button>

        <!-- Overlay -->
        <div class="overlay" id="overlay"></div>

        <!-- Add/Edit Sheet -->
        <div class="sheet" id="sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <h2 class="sheet-title" id="sheet-title">新增记录</h2>
                <button class="sheet-close" id="sheet-close-btn" aria-label="关闭">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="sheet-body">
                <div class="form-group">
                    <label class="form-label">时间</label>
                    <input type="datetime-local" class="form-input" id="entry-time">
                </div>
                <div class="form-group">
                    <label class="form-label">在做什么？</label>
                    <input type="text" class="form-input" id="entry-title" placeholder="记录你正在做什么..." autocomplete="off">
                    <span class="form-error" id="title-error">请输入内容</span>
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea class="form-input form-textarea" id="entry-note" placeholder="添加备注..." rows="3"></textarea>
                </div>
                <button class="form-delete-btn" id="form-delete-btn" style="display:none">删除此记录</button>
            </div>
            <div class="sheet-footer">
                <button class="btn-cancel" id="btn-cancel">取消</button>
                <button class="btn-save" id="btn-save">保存</button>
            </div>
        </div>

        <!-- Settings Sheet -->
        <div class="sheet" id="settings-sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <h2 class="sheet-title">AI 设置</h2>
                <button class="sheet-close" id="settings-close-btn" aria-label="关闭">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="sheet-body">
                <div class="form-group">
                    <label class="form-label">API 地址</label>
                    <input type="text" class="form-input" id="api-endpoint" placeholder="https://api.deepseek.com/v1" autocomplete="off">
                    <span class="form-hint">支持 OpenAI 兼容接口</span>
                </div>
                <div class="form-group">
                    <label class="form-label">API Key</label>
                    <input type="password" class="form-input" id="api-key" placeholder="sk-..." autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">模型名称</label>
                    <input type="text" class="form-input" id="api-model" placeholder="deepseek-chat" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">自定义提示词（可选）</label>
                    <textarea class="form-input form-textarea" id="api-prompt" placeholder="你是一位细腻的日记作家。根据以下一天的时间线记录，帮我写一篇流畅自然的中文日记..." rows="4"></textarea>
                </div>
            </div>
            <div class="sheet-footer">
                <button class="btn-cancel" id="settings-cancel-btn">取消</button>
                <button class="btn-save" id="settings-save-btn">保存设置</button>
            </div>
        </div>

        <!-- Diary Result Modal -->
        <div class="diary-modal" id="diary-modal">
            <div class="diary-modal-header">
                <h3 class="diary-modal-title">AI 生成的日记</h3>
                <span class="diary-modal-date" id="diary-date"></span>
                <button class="diary-modal-close" id="diary-close-btn" aria-label="关闭">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="diary-modal-body" id="diary-body">
                <!-- Loading or content -->
            </div>
            <div class="diary-modal-footer">
                <button class="diary-btn" id="diary-copy-btn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <rect x="5" y="5" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M11 5V3a1 1 0 00-1-1H3a1 1 0 00-1 1v8a1 1 0 001 1h2" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    <span>复制</span>
                </button>
                <button class="diary-btn" id="diary-retry-btn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M13.5 8a5.5 5.5 0 11-1.46-3.68" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M13.5 2.5V6H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>重新生成</span>
                </button>
                <button class="diary-btn diary-btn-primary" id="diary-close-done-btn">完成</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
